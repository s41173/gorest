name: CI

on:
  push:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go mod tidy

      - name: Run Integration Test
        env:
          MYSQLUSER: ${{ secrets.MYSQLUSER }}
          MYSQLPASSWORD: ${{ secrets.MYSQLPASSWORD }}
          MYSQLHOST: ${{ secrets.MYSQLHOST }}
          MYSQLPORT: ${{ secrets.MYSQLPORT }}
          MYSQLDATABASE: ${{ secrets.MYSQLDATABASE }}

          REDISHOST: ${{ secrets.REDISHOST }}
          REDISUSER: ${{ secrets.REDISUSER }}
          REDISPASS: ${{ secrets.REDISPASS }}

          JWT_SECRET: ${{ secrets.JWT_SECRET }}

        run: go test -v ./... -count=1
